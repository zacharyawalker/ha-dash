name: "HA Dash"
description: "A flexible, customizable Home Assistant dashboard"
version: "0.3.1"
slug: "ha-dash"
url: "https://github.com/your-repo/ha-dash"

arch:
  - amd64
  - aarch64
  - armv7

# Ingress settings (accessible via HA sidebar)
ingress: true
ingress_port: 8099
panel_icon: "mdi:view-dashboard"
panel_title: "HA Dash"

# No external port needed with ingress, but allow it for development
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Web interface (not required with ingress)"

init: false
startup: "application"
boot: "auto"

# API access
hassio_api: true
homeassistant_api: true

options: {}
schema: {}
