name: "HA Dash"
description: "Free-form drag-and-drop dashboard for Home Assistant with 50+ widget types"
version: "2.1.0"
slug: "ha-dash"
url: "https://github.com/zacharyawalker/ha-dash"

arch:
  - amd64
  - aarch64
  - armv7

# Ingress — accessible via HA sidebar
ingress: true
ingress_port: 8099
panel_icon: "mdi:view-dashboard"
panel_title: "HA Dash"

# External port for direct access (optional, disabled by default)
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Web interface (not required with ingress)"

init: false
startup: "application"
boot: "auto"

# HA API access
hassio_api: true
homeassistant_api: true
auth_api: true

# Persistent data directory
map:
  - config:rw
  - share:rw

options:
  log_level: "info"
  license_key: ""

schema:
  log_level: "list(debug|info|warning|error)"
  license_key: "str?"
