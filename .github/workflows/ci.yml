name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          JS_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || echo 0)
          CSS_SIZE=$(stat -c%s dist/assets/index-*.css 2>/dev/null || echo 0)
          echo "JS: $((JS_SIZE / 1024))KB, CSS: $((CSS_SIZE / 1024))KB"
          # Fail if JS > 600KB (uncompressed)
          if [ "$JS_SIZE" -gt 614400 ]; then
            echo "::error::Bundle size exceeds 600KB limit ($((JS_SIZE / 1024))KB)"
            exit 1
          fi

  backend:
    name: Backend — lint, check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py
